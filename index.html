<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>舞雲智網 - 智能報價單系統 v8.8</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
body { font-family: 'Noto Sans TC', sans-serif; }

/* --- 列印專用樣式 --- */
@media print {
    @page { size: A4; margin: 0; }
    body { margin: 0; padding: 0; background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .no-print { display: none !important; }
    .print-area { display: block !important; width: 210mm; margin: 0 auto; position: relative; }
    /* 強制分頁與固定高度 */
    .a4-paper { 
        width: 100% !important; 
        height: 296mm !important; /* 強制 A4 高度 */
        padding: 10mm 15mm !important; 
        box-shadow: none !important; 
        margin: 0 !important; 
        display: flex !important; 
        flex-direction: column !important; 
        page-break-after: always; /* 每張紙印完自動換下一頁 */
    }
    .a4-paper:last-child { page-break-after: auto; }
    ::-webkit-scrollbar { display: none; }
}

/* 螢幕顯示用的 A4 模擬 */
.a4-paper {
    width: 210mm;
    min-height: 297mm;
    background: white;
    margin: 0 auto 20px auto; /* 兩頁之間留白 */
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    padding: 12mm 15mm;
    position: relative;
    display: flex;
    flex-direction: column;
}

/* 表格樣式微調 */
.items-table th { background-color: #f3f4f6; border-bottom: 2px solid #e5e7eb; color: #374151; font-weight: 700; }
.items-table td { border-bottom: 1px solid #f3f4f6; }
</style>
</head>
<body class="bg-gray-100 text-gray-700">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SALES_REPS = [
    '請選擇', '黃永裕 Eddy', '管翊揚 Yang', '林靜美 Shaders', '吳玥瑨 Yueh', '陳念慈 Nico', '李靜 Lidia'
];

const QuotationSystem = () => {
  
  const getInitialData = () => {
    const today = new Date().toISOString().split('T')[0];
    const validDate = new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
    
    const defaultPayment = `驗收後月結 30 天
1) 簽約後付款總價 30%
2) 清冊/報告書完成後 30%
3) (內稽)結案 30%`;

    const defaultRemarks = `匯款資訊：兆豐國際商業銀行(017)新竹分行 | 帳號：203-09-06002-1 | 戶名：舞雲智網股份有限公司
工作項目：
1. 協助以下三處溫室氣體盤查清冊產出
-日本子公司GENII IDEAS JAPAN株式会社
-新加坡子公司GENII IDEAS(S) PTE. LTD.
-德國子公司GENII IDEAS GmbH
2. 彙整以下九處溫室氣體盤查資料為一本清冊、一本報告書檔案：
-新竹總部
-研發實驗暨量產基地/資材倉儲(新竹茄苳)
-台中辦公室
-台南辦公室
-高雄辦公室
-嘉義辦公室
-日本子公司GENII IDEAS JAPAN株式会社
-新加坡子公司GENII IDEAS(S) PTE. LTD.
-德國子公司GENII IDEAS GmbH

其它：
1. 本報價不包含給予第三方稽核單位之費用、本公司陪同稽核費用
2. 若需陪同外部稽核，須另行報價
3. 海外據點以線上方式進行輔導，並僅限於中英文輔導`;

    return {
      customerName: '聚賢研發股份有限公司',
      customerTaxId: '59075364',
      projectName: 'ISO 14064溫室氣體盤查',
      salesRep: SALES_REPS[0],
      quotationDate: today,
      validUntil: validDate,
      paymentTerms: defaultPayment,
      customRemarks: defaultRemarks,
      items: [
        {
          id: '1',
          description: 'ISO 14064溫室氣體盤查輔導',
          unit: '式',
          quantity: 1,
          unitPrice: 330000,
          remark: '2025年度'
        }
      ]
    };
  };

  const [data, setData] = useState(getInitialData());
  const [showPreview, setShowPreview] = useState(false);

  const handleReset = () => {
    if (confirm('確定要開新報價單嗎？目前未儲存的內容將會消失，並回復至預設值。')) {
      setData(getInitialData());
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  const handleChange = (field, value) => { setData(prev => ({ ...prev, [field]: value })); };
  const handleItemChange = (id, field, value) => {
    const newItems = data.items.map(item => item.id === id ? { ...item, [field]: value } : item);
    setData(prev => ({ ...prev, items: newItems }));
  };
  const addItem = () => {
    setData(prev => ({ ...prev, items: [...prev.items, { id: Date.now().toString(), description: '', unit: '式', quantity: 1, unitPrice: 0, remark: '' }] }));
  };
  const removeItem = (id) => { setData(prev => ({ ...prev, items: prev.items.filter(item => item.id !== id) })); };

  const subtotal = data.items.reduce((sum, item) => sum + (item.quantity * item.unitPrice), 0);
  const tax = Math.round(subtotal * 0.05);
  const total = subtotal + tax;

  const formatNumber = (num) => num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  const handlePrint = () => window.print();

  return (
    <div className="min-h-screen pb-12">
      {/* 頂部導航列 */}
      <div className="no-print bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="bg-blue-600 text-white w-8 h-8 rounded flex items-center justify-center"><i className="fas fa-calculator"></i></div>
            <h1 className="text-xl font-bold text-gray-800">智能報價單系統 <span className="text-xs font-normal text-gray-500 bg-gray-100 px-2 py-1 rounded ml-2">v8.8</span></h1>
          </div>
          <div className="flex gap-3">
            <button onClick={handleReset} className="px-4 py-2 bg-yellow-500 hover:bg-yellow-600 text-white rounded-lg text-sm font-bold shadow transition flex items-center gap-2">
              <i className="fas fa-file-circle-plus"></i> 新開報價單
            </button>
            <button onClick={() => setShowPreview(!showPreview)} className="lg:hidden px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium transition flex items-center gap-2">
              <i className={`fas ${showPreview ? 'fa-edit' : 'fa-eye'}`}></i> {showPreview ? '返回編輯' : '預覽'}
            </button>
            <button onClick={handlePrint} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-bold shadow-lg transition transform hover:-translate-y-0.5 flex items-center gap-2">
              <i className="fas fa-print"></i> 下載 PDF / 列印
            </button>
          </div>
        </div>
      </div>

      <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        {/* 左側：編輯區 */}
        <div className={`lg:col-span-4 space-y-6 no-print ${showPreview ? 'hidden' : 'block'}`}>
          <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><span className="w-1 h-5 bg-blue-500 rounded-full"></span> 客戶資訊</h2>
            <div className="space-y-3">
              <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase">客戶名稱</label><input type="text" value={data.customerName} onChange={(e) => handleChange('customerName', e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none" /></div>
              <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase">統一編號</label><input type="text" value={data.customerTaxId} onChange={(e) => handleChange('customerTaxId', e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none" /></div>
              <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase">專案名稱</label><input type="text" value={data.projectName} onChange={(e) => handleChange('projectName', e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none" /></div>
              <div>
                <label className="block text-xs font-bold text-gray-500 mb-1 uppercase text-blue-600">經辦人員 (業務姓名)</label>
                <select value={data.salesRep} onChange={(e) => handleChange('salesRep', e.target.value)} className="w-full px-3 py-2 border border-blue-200 rounded-lg outline-none bg-blue-50">
                    {SALES_REPS.map(rep => <option key={rep} value={rep}>{rep}</option>)}
                </select>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase">報價日期</label><input type="date" value={data.quotationDate} onChange={(e) => handleChange('quotationDate', e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none" /></div>
                <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase">有效期限</label><input type="date" value={data.validUntil} onChange={(e) => handleChange('validUntil', e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none" /></div>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><span className="w-1 h-5 bg-green-500 rounded-full"></span> 報價品項</h2>
            <div className="space-y-4">
              {data.items.map((item, idx) => (
                <div key={item.id} className="bg-gray-50 p-3 rounded-lg border border-gray-200 relative group">
                  <button onClick={() => removeItem(item.id)} className="absolute top-2 right-2 w-6 h-6 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded transition"><i className="fas fa-trash-alt text-xs"></i></button>
                  <div className="space-y-2">
                    <div><label className="text-xs font-bold text-gray-500 uppercase">品項描述 ({idx + 1})</label><textarea rows="2" value={item.description} onChange={(e) => handleItemChange(item.id, 'description', e.target.value)} className="w-full mt-1 px-2 py-1 text-sm border border-gray-300 rounded outline-none"></textarea></div>
                    <div className="grid grid-cols-3 gap-2">
                        <div><label className="text-xs font-bold text-gray-500 uppercase">數量</label><input type="number" value={item.quantity} onChange={(e) => handleItemChange(item.id, 'quantity', parseFloat(e.target.value) || 0)} className="w-full mt-1 px-2 py-1 text-sm border border-gray-300 rounded outline-none" /></div>
                        <div><label className="text-xs font-bold text-gray-500 uppercase">單位</label><input type="text" value={item.unit} onChange={(e) => handleItemChange(item.id, 'unit', e.target.value)} className="w-full mt-1 px-2 py-1 text-sm border border-gray-300 rounded outline-none" /></div>
                        <div><label className="text-xs font-bold text-gray-500 uppercase">單價</label><input type="number" value={item.unitPrice} onChange={(e) => handleItemChange(item.id, 'unitPrice', parseFloat(e.target.value) || 0)} className="w-full mt-1 px-2 py-1 text-sm border border-gray-300 rounded outline-none" /></div>
                    </div>
                    <div><label className="text-xs font-bold text-gray-500 uppercase">備註 (列印顯示)</label><input type="text" value={item.remark} onChange={(e) => handleItemChange(item.id, 'remark', e.target.value)} className="w-full mt-1 px-2 py-1 text-sm border border-gray-300 rounded outline-none" /></div>
                  </div>
                </div>
              ))}
              <button onClick={addItem} className="w-full py-2 border-2 border-dashed border-gray-300 text-gray-500 hover:border-blue-500 hover:text-blue-500 rounded-lg font-medium transition flex items-center justify-center gap-2"><i className="fas fa-plus"></i> 新增品項</button>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><span className="w-1 h-5 bg-purple-500 rounded-full"></span> 條款與備註</h2>
            <div className="space-y-3">
                <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase">付款條件</label><textarea rows="4" value={data.paymentTerms} onChange={(e) => handleChange('paymentTerms', e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none text-sm"></textarea></div>
                <div><label className="block text-xs font-bold text-gray-500 mb-1 uppercase">其他備註 (顯示於下一頁)</label><textarea rows="8" value={data.customRemarks} onChange={(e) => handleChange('customRemarks', e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none text-sm"></textarea></div>
            </div>
          </div>
        </div>

        {/* --- 右側：預覽區 (兩頁設計) --- */}
        <div className={`lg:col-span-8 print-area ${!showPreview ? 'hidden lg:block' : 'block'}`}>
          
          {/* ============== 第一頁：明細與總計 ============== */}
          <div className="a4-paper">
            {/* Header */}
            <div className="header-section mb-6 border-b-2 border-gray-800 pb-4">
                <div className="flex justify-between items-end">
                    <div>
                        <h1 className="text-4xl font-black text-gray-900 tracking-wide">報 價 單</h1>
                        <p className="text-base text-gray-500 mt-1 font-medium tracking-widest">QUOTATION</p>
                    </div>
                    <div className="flex items-center gap-4">
                        <img src="./LOGO.gif" alt="Company Logo" className="h-20 w-auto" />
                        <div className="text-right">
                            <div className="text-2xl font-bold text-gray-800">舞雲智網股份有限公司</div>
                            <div className="text-sm text-gray-500 mt-1">統一編號：53789408</div>
                            <div className="text-sm text-gray-500">新竹縣竹北市復興三路二段76號</div>
                            <div className="text-sm text-gray-500">Tel: (03)658-9760</div>
                        </div>
                    </div>
                </div>
            </div>

            {/* Info Section */}
            <div className="info-section mb-6 grid grid-cols-2 gap-8">
                <div className="info-box border border-gray-300 p-3 rounded-sm">
                    <h3 className="text-sm font-bold text-gray-400 border-b border-gray-200 pb-1 mb-2 uppercase">Client Info (客戶資料)</h3>
                    <table className="w-full text-base">
                        <tbody>
                            <tr><td className="py-1 text-gray-500 w-24">客戶名稱：</td><td className="py-1 font-bold text-gray-800">{data.customerName}</td></tr>
                            <tr><td className="py-1 text-gray-500">統一編號：</td><td className="py-1 text-gray-800">{data.customerTaxId}</td></tr>
                            <tr><td className="py-1 text-gray-500">專案名稱：</td><td className="py-1 text-gray-800">{data.projectName}</td></tr>
                        </tbody>
                    </table>
                </div>
                <div className="info-box border border-gray-300 p-3 rounded-sm">
                    <h3 className="text-sm font-bold text-gray-400 border-b border-gray-200 pb-1 mb-2 uppercase">Quote Info (報價資料)</h3>
                    <table className="w-full text-base">
                        <tbody>
                            <tr><td className="py-1 text-gray-500 w-24">報價單號：</td><td className="py-1 text-gray-800">Q-{data.quotationDate.replace(/-/g, '')}-01</td></tr>
                            <tr><td className="py-1 text-gray-500">報價日期：</td><td className="py-1 text-gray-800">{data.quotationDate}</td></tr>
                            <tr><td className="py-1 text-gray-500">有效期限：</td><td className="py-1 text-gray-800">{data.validUntil}</td></tr>
                            <tr><td className="py-1 text-gray-500">經辦人員：</td><td className="py-1 font-bold text-gray-800">{data.salesRep}</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            {/* Items Table */}
            <div className="items-section">
                <table className="items-table w-full text-left border-collapse">
                    <thead>
                        <tr className="text-sm uppercase text-gray-600">
                            <th className="py-2 px-2 w-10 text-center">No.</th>
                            <th className="py-2 px-2">Description (品項 / 規格)</th>
                            <th className="py-2 px-2 w-16 text-center">Unit</th>
                            <th className="py-2 px-2 w-16 text-right">Qty</th>
                            <th className="py-2 px-2 w-28 text-right">Unit Price</th>
                            <th className="py-2 px-2 w-28 text-right">Amount</th>
                            <th className="py-2 px-2 w-24 text-right">Remark</th>
                        </tr>
                    </thead>
                    <tbody className="text-base">
                        {data.items.map((item, idx) => (
                            <tr key={item.id}>
                                <td className="py-3 px-2 text-center text-gray-500">{idx + 1}</td>
                                <td className="py-3 px-2 whitespace-pre-wrap">{item.description}</td>
                                <td className="py-3 px-2 text-center">{item.unit}</td>
                                <td className="py-3 px-2 text-right">{item.quantity}</td>
                                <td className="py-3 px-2 text-right">{formatNumber(item.unitPrice)}</td>
                                <td className="py-3 px-2 text-right font-bold">{formatNumber(item.quantity * item.unitPrice)}</td>
                                <td className="py-3 px-2 text-gray-500 text-sm text-right">{item.remark}</td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>

            {/* 利用 mt-auto 將總計推到第一頁的最下方 */}
            <div className="mt-auto flex justify-end pb-8">
                <div className="w-72">
                    <div className="flex justify-between py-1 text-base text-gray-600"><span>合計 (Subtotal):</span><span>NT$ {formatNumber(subtotal)}</span></div>
                    <div className="flex justify-between py-1 text-base text-gray-600 border-b border-gray-300"><span>稅額 (Tax 5%):</span><span>NT$ {formatNumber(tax)}</span></div>
                    <div className="flex justify-between py-2 text-xl font-bold text-gray-900"><span>總計 (Total):</span><span>NT$ {formatNumber(total)}</span></div>
                </div>
            </div>
          </div>
          {/* ============== 第一頁 結束 ============== */}


          {/* ============== 第二頁：條款與簽章 ============== */}
          <div className="a4-paper">
            {/* 備註與條款 (灰框) */}
            <div className="terms-box border border-gray-300 p-5 rounded-sm text-base bg-gray-50">
                <div className="grid grid-cols-1 gap-4">
                    <div className="flex">
                        <div className="font-bold text-gray-700 w-24 flex-shrink-0">付款條件：</div>
                        <div className="text-gray-700 whitespace-pre-wrap flex-1 leading-relaxed">{data.paymentTerms}</div>
                    </div>
                    <div className="flex">
                        <div className="font-bold text-gray-700 w-24 flex-shrink-0">其他備註：</div>
                        <div className="text-gray-700 whitespace-pre-wrap flex-1 leading-relaxed">{data.customRemarks}</div>
                    </div>
                </div>
            </div>

            {/* 簽名欄 - 包含舞雲專用浮水印 */}
            <div className="mt-24 flex justify-between items-end px-12 pb-12">
                <div className="text-center w-5/12">
                    <div className="border-b border-gray-400 mb-2 h-16"></div>
                    <div className="text-base text-gray-500">客戶簽核 (Customer Signature)</div>
                </div>
                <div className="text-center w-5/12 relative">
                    {/* 舞雲專用紅色浮水印印章 */}
                    <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 rotate-[-5deg] border-[3px] border-red-200 rounded-full w-28 h-28 flex items-center justify-center z-0 opacity-80 pointer-events-none">
                        <div className="text-red-200 font-serif text-2xl font-bold leading-tight tracking-[0.2em] text-center">
                            舞雲<br/>專用
                        </div>
                    </div>
                    <div className="border-b border-gray-400 mb-2 h-16 relative z-10"></div>
                    <div className="text-base text-gray-500 relative z-10">公司簽章 (Authorized Signature)</div>
                </div>
            </div>
          </div>
          {/* ============== 第二頁 結束 ============== */}

        </div>
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<QuotationSystem />);
</script>
</body>
</html>
